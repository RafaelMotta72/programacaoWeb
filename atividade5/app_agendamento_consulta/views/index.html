<!DOCTYPE html>
<html lang="pt-br">

<head>
    <title>Agendamento</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<div class="container">

    <div class="row">
        <div class="col-12 text-center mt-3">
            <h1>Agendamento</h1>
        </div>
    </div>
        
    <form action="/agendamento" method="post">

        <div class="row mt-3">
            <div class="col-12">
                <h3>Dados do paciente</h3>
            </div>

            <div class="col-6 mt-1">
                <label for="nome" class="form-label">Nome:</label>
                <input type="text" id="nome" name="nome" class="form-control">
            </div>

            <div class="col-6 mt-1">
                <label for="sobrenome" class="form-label">Sobrenome:</label>
                <input type="text" id="sobrenome" name="sobrenome" class="form-control">
            </div>

            <div class="col-6 mt-1">
                <label for="cpf" class="form-label">CPF:</label>
                <input type="number" id="cpf" name="cpf" class="form-control">
            </div>

            <div class="col-6 mt-1">
                <label for="data_nascimento" class="form-label">Data de nascimento:</label>
                <input type="date" id="data_nascimento" name="data_nascimento" class="form-control">
            </div>

            <div class="col-6 mt-1">
                <label for="telefone" class="form-label">Telefone:</label>
                <input type="text" id="telefone" name="telefone" class="form-control">
            </div>

            <div class="col-6 mt-1">
                <label for="cep" class="form-label">CEP:</label>
                <input type="text" id="cep" name="cep" class="form-control">
            </div>

            <div class="col-12 mt-1">
                <label for="endereco" class="form-label">Endereço:</label>
                <input type="text" id="endereco" name="endereco" class="form-control">
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-12">
                <h3>Dados da consulta</h3>
            </div>

            <div class="col-6 mt-1">
                <label for="clinica" class="form-label">Clínica:</label>
                <input type="text" id="clinica" name="clinica" class="form-control">
            </div>

            <div class="col-6 mt-1">
                <label for="especialidade" class="form-label">Especialidade:</label>
                <input type="text" id="especialidade" name="especialidade" class="form-control">
            </div>

            <div class="col-12 mt-1">
                <label for="observacao" class="form-label">Observação:</label>
                <textarea id="observacao" name="observacao" class="form-control"></textarea>
            </div>

            <div class="col-6 mt-1">
                <label for="data_consulta" class="form-label">Data da consulta:</label>
                <input type="date" id="data_consulta" name="data_consulta" class="form-control">
            </div>

            <div class="col-6 mt-1">
                <label for="hora_consulta" class="form-label">Hora da consulta:</label>
                <input type="time" id="hora_consulta" name="hora_consulta" class="form-control">
            </div>

        </div>

        <div class="row mt-3">
            <div class="col-12">
                <button type="submit" class="btn btn-primary w-100">Enviar</button>
            </div>
        </div>

    </form>

</div>

</body>

</html>
